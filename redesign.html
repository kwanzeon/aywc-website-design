// ─── CONTACT ───────────────────────────────────────────────────────────────────
const Contact = ({ t, sectionSpacing, titleFont }) => {
  const [sent, setSent] = useState(false);
  const [errors, setErrors] = useState({});

  const validate = (form) => {
    const errs = {};
    if (!form.name.value.trim()) errs.name = 'Name is required.';
    if (!form.email.value.trim()) errs.email = 'Email address is required.';
    else if (!/^[^@]+@[^@]+\.[^@]+$/.test(form.email.value)) errs.email = 'Please enter a valid email address.';
    if (!form.message.value.trim()) errs.message = 'Message is required.';
    return errs;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const errs = validate(e.target);
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});
    setSent(true);
  };
  const py = sectionSpacing === "generous" ? "6rem" : "4rem";
  const sectionBg = t.darkSection;
  const sectionText = t.darkSectionText;
  const sectionMuted = t.darkSectionMuted;
  const inputBg = "rgba(255,255,255,0.07)";
  const inputBorder = "rgba(232,221,208,0.25)";

  const selectStyle = {
    width: "100%", padding: "0.85rem 1rem",
    background: t.darkSection, border: `1px solid rgba(232,221,208,0.25)`,
    color: t.darkSectionText, fontSize: "0.9rem", fontFamily: "'Jost', sans-serif",
    outline: "none", transition: "border-color 0.2s",
  };

  const inputStyle = {
    width: "100%", padding: "0.85rem 1rem",
    background: inputBg, border: `1px solid ${inputBorder}`,
    color: sectionText, fontSize: "0.9rem", fontFamily: "'Jost', sans-serif",
    outline: "none",
    transition: "border-color 0.2s",
  };

  return (
    <section id="join" aria-labelledby="join-heading" style={{ background: sectionBg, padding: `${py} 3rem`, borderTop: `1px solid ${t.border}` }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6rem" }}>
        <div>
          <div style={{ color: t.accentOnDark, fontSize: 10, letterSpacing: 4, textTransform: "uppercase", fontWeight: 600, marginBottom: "0.8rem" }}>Open to All</div>
          <h2 id="join-heading" style={{
            fontFamily: "var(--heading-font)",
            fontWeight: "var(--heading-weight)",
            fontSize: "clamp(1.8rem, 3vw, 2.8rem)",
            color: sectionText, letterSpacing: "-0.01em", marginBottom: "1.5rem",
          }}>Join &amp; Contact</h2>
          <p style={{ color: sectionMuted, fontSize: "0.95rem", lineHeight: 1.8, fontWeight: 300, marginBottom: "2.5rem" }}>
            The Agni Yoga World Community is a volunteer-run initiative with no formal membership or hierarchy. We exist only to connect and support the many independent groups and students already active around the world.
          </p>
          <div style={{ marginBottom: "2rem" }}>
            <div style={{ color: sectionText, fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.8rem", letterSpacing: 1 }}>How to Get Involved</div>
            {["Connect with an existing local study group", "Register your own group in the directory", "Contribute resources, translations, or articles", "Share news of events in your region", "Volunteer to help maintain this site"].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: "0.8rem", marginBottom: "0.5rem", alignItems: "flex-start" }}>
                <span style={{ color: t.accentOnDark, marginTop: 2, flexShrink: 0 }}>✦</span>
                <span style={{ color: sectionMuted, fontSize: "0.875rem", fontWeight: 300, lineHeight: 1.6 }}>{item}</span>
              </div>
            ))}
          </div>
          <div style={{ color: t.accentOnDark, fontSize: "0.85rem" }}>info@agniYogaWorldCommunity.org</div>
        </div>
        <div>
          <div style={{ color: sectionText, fontSize: "0.85rem", fontWeight: 600, letterSpacing: 1, marginBottom: "1.5rem" }}>Send a Message</div>
          {sent ? (
            <div role="status" aria-live="polite" style={{ padding: "2.5rem", background: "rgba(255,255,255,0.05)", border: `1px solid ${t.accentOnDark}`, color: t.accentOnDark, textAlign: "center" }}>
              <div style={{ fontSize: "0.9rem", fontWeight: 500 }}>Message received. Thank you.</div>
            </div>
          ) : (
            <form onSubmit={handleSubmit} noValidate aria-label="Contact form">
              <div className="field">
                <label htmlFor="contact-name" style={{ color: t.darkSectionText }}>Name</label>
                <input id="contact-name" name="name" type="text" placeholder="Your name" required aria-required="true"
                  aria-describedby={errors.name ? "err-name" : undefined}
                  aria-invalid={errors.name ? "true" : undefined}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = t.accent}
                  onBlur={e => e.target.style.borderColor = inputBorder} />
                {errors.name && <span id="err-name" role="alert" style={{ color: "#FF8FA3", fontSize: "0.78rem", marginTop: "0.2rem" }}>{errors.name}</span>}
              </div>
              <div className="field">
                <label htmlFor="contact-email" style={{ color: t.darkSectionText }}>Email</label>
                <input id="contact-email" name="email" type="email" placeholder="your@email.com" required aria-required="true"
                  aria-describedby={errors.email ? "err-email" : undefined}
                  aria-invalid={errors.email ? "true" : undefined}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = t.accent}
                  onBlur={e => e.target.style.borderColor = inputBorder} />
                {errors.email && <span id="err-email" role="alert" style={{ color: "#FF8FA3", fontSize: "0.78rem", marginTop: "0.2rem" }}>{errors.email}</span>}
              </div>
              <div className="field">
                <label htmlFor="contact-reason" style={{ color: t.darkSectionText }}>Reason for contact</label>
                <select id="contact-reason" style={selectStyle}>
                  <option value="" style={{ background: t.darkSection, color: t.darkSectionText }}>Select one…</option>
                  <option style={{ background: t.darkSection, color: t.darkSectionText }}>General inquiry</option>
                  <option style={{ background: t.darkSection, color: t.darkSectionText }}>Register a study group</option>
                  <option style={{ background: t.darkSection, color: t.darkSectionText }}>Submit news or event</option>
                  <option style={{ background: t.darkSection, color: t.darkSectionText }}>Contribute resources</option>
                  <option style={{ background: t.darkSection, color: t.darkSectionText }}>Volunteer offer</option>
                </select>
              </div>
              <div className="field">
                <label htmlFor="contact-message" style={{ color: t.darkSectionText }}>Message</label>
                <textarea id="contact-message" name="message" placeholder="Your message…" required aria-required="true"
                  aria-describedby={errors.message ? "err-message" : undefined}
                  aria-invalid={errors.message ? "true" : undefined}
                  rows={5} style={{ ...inputStyle, resize: "vertical" }}
                  onFocus={e => e.target.style.borderColor = t.accent}
                  onBlur={e => e.target.style.borderColor = inputBorder}></textarea>
                {errors.message && <span id="err-message" role="alert" style={{ color: "#FF8FA3", fontSize: "0.78rem", marginTop: "0.2rem" }}>{errors.message}</span>}
              </div>
              <button type="submit" style={{
                width: "100%", padding: "1rem",
                background: t.accent, color: t.accentText || "#FFFFFF",
                border: "none", cursor: "pointer",
                fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
                fontFamily: "'Jost', sans-serif",
                transition: "background 0.2s",
              }}
                onMouseEnter={e => e.target.style.background = t.accentHover}
                onMouseLeave={e => e.target.style.background = t.accent}
              >Send Message</button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
};

const Footer = ({ t }) => (
  <footer role="contentinfo" style={{
    background: t.darkSection,
    borderTop: `1px solid rgba(232,221,208,0.08)`,
    padding: "3rem",
  }}>
    <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "1rem" }}>
      <div>
        <div style={{ color: t.darkSectionText, fontSize: "0.8rem", fontWeight: 300, marginBottom: "0.3rem" }}>
          Agni Yoga World Community — connecting students of the Living Ethics teachings worldwide.
        </div>
        <div style={{ color: t.darkSectionMuted, fontSize: "0.75rem" }}>White Mountain Education Association</div>
      </div>
      <div style={{ display: "flex", gap: "2rem" }}>
        {["About", "News", "Groups", "Resources", "Contact"].map(l => (
          <a key={l} href={`#${l.toLowerCase()}`} style={{ color: "rgba(232,221,208,0.65)", fontSize: "0.75rem", fontWeight: 400, letterSpacing: 1, transition: "color 0.2s" }}
            onMouseEnter={e => e.target.style.color = t.accentOnDark}
            onMouseLeave={e => e.target.style.color = "rgba(232,221,208,0.65)"}
          >{l}</a>
        ))}
      </div>
    </div>
  </footer>
);

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = themes[tweaks.theme] || themes.midnight;

  useEffect(() => {
    const font = tweaks.titleFont === "cinzel" ? "'Cinzel', serif" : "'Jost', sans-serif";
    const weight = tweaks.titleFont === "cinzel" ? "400" : "300";
    document.documentElement.style.setProperty('--heading-font', font);
    document.documentElement.style.setProperty('--heading-weight', weight);
    // Cinzel is all-caps only — always keep body text in Jost
    document.documentElement.style.setProperty('--body-font', "'Jost', sans-serif");
  }, [tweaks.titleFont]);

  return (
    <div style={{ background: t.bg, minHeight: "100vh", transition: "background 0.5s" }}>
      <Nav t={t} />
      <main id="main-content">
      <Hero t={t} titleFont={tweaks.titleFont} />
      <About t={t} sectionSpacing={tweaks.sectionSpacing} titleFont={tweaks.titleFont} />
      <News t={t} sectionSpacing={tweaks.sectionSpacing} titleFont={tweaks.titleFont} />
      <Groups t={t} sectionSpacing={tweaks.sectionSpacing} titleFont={tweaks.titleFont} />
      <Resources t={t} sectionSpacing={tweaks.sectionSpacing} titleFont={tweaks.titleFont} />
      <Contact t={t} sectionSpacing={tweaks.sectionSpacing} titleFont={tweaks.titleFont} />
      </main>
      <Footer t={t} />


      <TweaksPanel>
        <TweakSection label="Theme Direction">
          <TweakRadio label="Palette"
            value={tweaks.theme}
            onChange={v => setTweak("theme", v)}
            options={[
              { value: "midnight", label: "Midnight" },
              { value: "dawn", label: "Dawn" },
              { value: "threshold", label: "Threshold" },
            ]} />
        </TweakSection>
        <TweakSection label="Typography">
          <TweakRadio label="Heading style"
            value={tweaks.titleFont}
            onChange={v => setTweak("titleFont", v)}
            options={[
              { value: "cinzel", label: "Cinzel serif" },
              { value: "jost", label: "Jost sans" },
            ]} />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Section spacing"
            value={tweaks.sectionSpacing}
            onChange={v => setTweak("sectionSpacing", v)}
            options={[
              { value: "generous", label: "Generous" },
              { value: "compact", label: "Compact" },
            ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
