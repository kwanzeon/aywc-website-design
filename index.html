<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agni Yoga World Community — Living Ethics Teaching &amp; Study Groups Worldwide</title>
<meta name="description" content="A global gathering place for students of the Agni Yoga (Living Ethics) teachings. Find study groups, events, free texts, and resources on the path of Helena and Nicholas Roerich.">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
<link rel="canonical" href="https://wmea-world.org/dv/agni-yoga-world-community/">
<meta property="og:type" content="website">
<meta property="og:title" content="Agni Yoga World Community">
<meta property="og:description" content="A global gathering place for students of the Agni Yoga (Living Ethics) teachings.">
<meta property="og:image" content="https://wmea-world.org/dv/wp-content/plugins/aywc-templates/assets/banner.png">
<link rel="icon" type="image/x-icon" href="uploads/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "threshold",
  "titleFont": "cinzel"
}/*EDITMODE-END*/;

function HomePage() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = aywcThemes[tweaks.theme] || aywcThemes.threshold;

  useEffect(() => {
    const font = tweaks.titleFont === "cinzel" ? "'Cinzel', serif" : "'Jost', sans-serif";
    const weight = tweaks.titleFont === "cinzel" ? "400" : "300";
    document.documentElement.style.setProperty("--heading-font", font);
    document.documentElement.style.setProperty("--heading-weight", weight);
    const s = document.createElement("style");
    s.textContent = commonCSS;
    document.head.appendChild(s);
    return () => document.head.removeChild(s);
  }, [tweaks.titleFont]);

  const events = [
    { type: "Conference", title: "WMEA International Living Ethics Conference 2026", date: "2026 · Prescott, Arizona", body: "Theme: Agni Yoga — The Fiery Signs of a New Humanity. Keynote by Rev. Joleen D. DuBois." },
    { type: "Event", title: "International Agni Yoga Conference 2025", date: "Sep 14–16, 2025 · Helsinki & Online", body: "Groups from across Europe, the Americas, and Asia gather around The Heart as the Centre of Consciousness." },
    { type: "Publication", title: "New Study Guide: Fiery World Volume I", date: "Released April 2025", body: "Community-developed study companion with chapter summaries and reflection questions." },
  ];

  const groups = [
    { name: "White Mountain Education Association", location: "Prescott, Arizona, USA", desc: "Founded 1982. Weekly classes, annual conference, and the Agni Yoga Quarterly." },
    { name: "Agni Yoga Society", location: "New York, USA", desc: "Founded 1920. Publisher of English translations — all fourteen volumes freely available." },
    { name: "Friends of the Roerichs", location: "London, UK", desc: "Monthly gatherings exploring the teachings alongside Roerich's art." },
    { name: "Roerich Cultural Centre", location: "Moscow, Russia", desc: "Library, lecture program, and regular seminars open to all." },
  ];

  const py = "5rem";

  return (
    <div style={{ background: t.bg, minHeight: "100vh" }}>
      <Nav t={t} transparent={true} />

      {/* ── HERO ── */}
      <section id="hero" aria-label="Hero">
        <div style={{ width: "100%", lineHeight: 0, position: "relative" }}>
          <h1 className="sr-only">Agni Yoga World Community</h1>
          <img
            src="uploads/banner_image-1777232306367.png"
            alt="Agni Yoga World Community — banner showing the Maitreya seal against Himalayan mountains and starlit sky"
            style={{ width: "100%", display: "block" }}
          />
        </div>
        <div style={{ background: t.darkSection, padding: "3rem" }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "3rem", flexWrap: "wrap" }}>
            <div>
              <div style={{ color: "rgba(232,221,208,0.85)", fontSize: 10, letterSpacing: 4, textTransform: "uppercase", fontWeight: 500, marginBottom: "0.7rem" }}>
                White Mountain Education Association
              </div>
              <p style={{ color: t.darkSectionText, fontSize: "clamp(0.95rem, 1.5vw, 1.1rem)", fontWeight: 300, lineHeight: 1.7, maxWidth: 620 }}>
                A global gathering place for students and groups working with the Living Ethics teachings — sharing knowledge, community, and the path of conscious evolution.
              </p>
            </div>
            <div style={{ display: "flex", gap: "1rem", flexShrink: 0 }}>
              <CTAButton t={t} href="about.html" onDark={true}>Explore the Path</CTAButton>
              <CTAButton t={t} href="join.html" outline={true} onDark={true}>Join the Community</CTAButton>
            </div>
          </div>
        </div>
      </section>

      <main id="main-content">

        {/* ── ABOUT TEASER ── */}
        <section id="about" aria-labelledby="about-heading" style={{ background: t.darkSection, padding: `${py} 3rem` }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6rem", alignItems: "center" }}>
            <div>
              <SectionLabel t={t} onDark={true}>The Teaching</SectionLabel>
              <SectionHeading t={t} id="about-heading" color={t.darkSectionText}>About Agni Yoga</SectionHeading>
              <div style={{ width: 48, height: 1, background: t.accentOnDark, margin: "1.5rem 0", opacity: 0.4 }}></div>
              <p style={{ color: t.darkSectionMuted, fontSize: "0.95rem", lineHeight: 1.85, fontWeight: 300, marginBottom: "1.5rem" }}>
                Agni Yoga, also known as Living Ethics, is a spiritual teaching transmitted through Helena Roerich. It offers practical guidance for the conscious development of the human spirit — not as retreat from the world, but toward its transformation through beauty, service, and striving.
              </p>
              <p style={{ color: t.darkSectionMuted, fontSize: "0.95rem", lineHeight: 1.85, fontWeight: 300, marginBottom: "2rem" }}>
                The series comprises fourteen books of wisdom, touching on ethics, cosmology, the nature of consciousness, and the path of evolution. Central is the principle of Maitreya — universal brotherhood and goodwill.
              </p>
              <CTAButton t={t} href="about.html" onDark={true}>Learn about the teachings →</CTAButton>
            </div>
            <div>
              {[["Beauty", "Consciously created in daily life"], ["The Heart", "Awakened through striving and love"], ["Service", "Rendered as an act of spiritual will"], ["Striving", "Toward higher ideals, always"]].map(([title, sub]) => (
                <div key={title} style={{ borderLeft: `2px solid rgba(232,221,208,0.12)`, paddingLeft: "1.5rem", marginBottom: "2rem" }}>
                  <div style={{ color: t.accentOnDark, fontSize: "0.8rem", fontWeight: 600, letterSpacing: 2, textTransform: "uppercase", marginBottom: "0.3rem" }}>{title}</div>
                  <div style={{ color: t.darkSectionMuted, fontSize: "0.85rem", fontWeight: 300 }}>{sub}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* ── NEWS TEASER ── */}
        <section id="news" aria-labelledby="news-heading" style={{ background: t.bg, padding: `${py} 3rem`, borderTop: `1px solid ${t.border}` }}>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: "3rem", flexWrap: "wrap", gap: "1rem" }}>
              <div>
                <SectionLabel t={t}>Around the World</SectionLabel>
                <SectionHeading t={t} id="news-heading">News &amp; Events</SectionHeading>
              </div>
              <a href="news.html" style={{ color: t.accent, fontSize: 10, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, borderBottom: `1px solid ${t.accent}`, paddingBottom: 2, display: "inline-flex", alignItems: "center" }}>All events →</a>
            </div>
            <CardGrid t={t} cols="repeat(3, 1fr)">
              {events.map((ev, i) => (
                <Card t={t} key={i}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "1.5rem" }}>
                    <span style={{ background: t.tagBg, color: t.tagText, fontSize: 9, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase", padding: "0.3rem 0.8rem", display: "inline-flex", alignItems: "center" }}>{ev.type}</span>
                  </div>
                  <h3 style={{ color: t.text, fontSize: "0.95rem", fontWeight: 500, lineHeight: 1.4, marginBottom: "0.8rem" }}>{ev.title}</h3>
                  <p style={{ color: t.textMuted, fontSize: "0.85rem", lineHeight: 1.7, fontWeight: 300, marginBottom: "1.2rem", flex: 1 }}>{ev.body}</p>
                  <div style={{ color: t.accent, fontSize: "0.78rem", fontWeight: 500 }}>{ev.date}</div>
                </Card>
              ))}
            </CardGrid>
          </div>
        </section>

        {/* ── GROUPS TEASER ── */}
        <section id="groups" aria-labelledby="groups-heading" style={{ background: t.bgAlt, padding: `${py} 3rem`, borderTop: `1px solid ${t.border}` }}>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: "3rem", flexWrap: "wrap", gap: "1rem" }}>
              <div>
                <SectionLabel t={t}>Directory</SectionLabel>
                <SectionHeading t={t} id="groups-heading">Study Groups</SectionHeading>
              </div>
              <a href="groups.html" style={{ color: t.accent, fontSize: 10, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, borderBottom: `1px solid ${t.accent}`, paddingBottom: 2, display: "inline-flex", alignItems: "center" }}>Full directory →</a>
            </div>
            <CardGrid t={t} cols="repeat(2, 1fr)">
              {groups.map((g, i) => (
                <Card t={t} key={i} href="groups.html">
                  <h3 style={{ color: t.text, fontSize: "0.92rem", fontWeight: 600, lineHeight: 1.4, marginBottom: "0.4rem" }}>{g.name}</h3>
                  <div style={{ color: t.accent, fontSize: "0.75rem", fontWeight: 500, letterSpacing: 1, marginBottom: "0.8rem" }}>{g.location}</div>
                  <p style={{ color: t.textMuted, fontSize: "0.85rem", lineHeight: 1.7, fontWeight: 300 }}>{g.desc}</p>
                </Card>
              ))}
            </CardGrid>
          </div>
        </section>

        {/* ── RESOURCES TEASER ── */}
        <section id="resources" aria-labelledby="resources-heading" style={{ background: t.bg, padding: `${py} 3rem`, borderTop: `1px solid ${t.border}` }}>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: "3rem", flexWrap: "wrap", gap: "1rem" }}>
              <div>
                <SectionLabel t={t}>Open Access</SectionLabel>
                <SectionHeading t={t} id="resources-heading">Resources</SectionHeading>
              </div>
              <a href="resources.html" style={{ color: t.accent, fontSize: 10, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, borderBottom: `1px solid ${t.accent}`, paddingBottom: 2, display: "inline-flex", alignItems: "center" }}>All resources →</a>
            </div>
            <CardGrid t={t} cols="repeat(3, 1fr)">
              {[
                { title: "The Agni Yoga Series", desc: "All fourteen volumes freely available in multiple languages.", href: "resources.html#texts" },
                { title: "Agni Yoga Quarterly", desc: "Published by WMEA — current and archived issues of the community journal.", href: "resources.html#quarterly" },
                { title: "Helena Roerich's Notebooks", desc: "Spiritual diaries available in English and Portuguese translations.", href: "resources.html#notebooks" },
                { title: "An Agni Yoga Companion", desc: "A community guide for students beginning study of the teachings.", href: "resources.html#companion" },
                { title: "Roerich Paintings", desc: "Nicholas Roerich's Himalayan spiritual paintings — a curated gallery.", href: "resources.html#gallery" },
                { title: "Audio & Video Lectures", desc: "Sunday talks and lecture recordings from WMEA — free to access.", href: "resources.html#audio" },
              ].map((r, i) => (
                <Card t={t} key={i} href={r.href}>
                  <AccentLine t={t} />
                  <h3 style={{ color: t.text, fontSize: "0.92rem", fontWeight: 600, marginBottom: "0.6rem" }}>{r.title}</h3>
                  <p style={{ color: t.textMuted, fontSize: "0.85rem", lineHeight: 1.7, fontWeight: 300 }}>{r.desc}</p>
                </Card>
              ))}
            </CardGrid>
          </div>
        </section>

        {/* ── JOIN CTA ── */}
        <section id="join" aria-labelledby="join-heading" style={{ background: t.darkSection, padding: `${py} 3rem` }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6rem", alignItems: "center" }}>
            <div>
              <SectionLabel t={t} onDark={true}>Open to All</SectionLabel>
              <h2 id="join-heading" style={{ fontFamily: "var(--heading-font)", fontWeight: "var(--heading-weight)", fontSize: "clamp(1.8rem, 3vw, 2.8rem)", color: t.darkSectionText, letterSpacing: "-0.01em", marginBottom: "1.2rem" }}>Join &amp; Connect</h2>
              <p style={{ color: t.darkSectionMuted, fontSize: "0.95rem", lineHeight: 1.85, fontWeight: 300, marginBottom: "2rem" }}>
                The Agni Yoga World Community is volunteer-run with no formal membership or hierarchy. Whether you are new to the teachings or an experienced student, you are welcome here.
              </p>
              <CTAButton t={t} href="join.html" onDark={true}>Get in touch →</CTAButton>
            </div>
            <div style={{ borderLeft: `1px solid rgba(232,221,208,0.1)`, paddingLeft: "3rem" }}>
              {["Connect with an existing local study group", "Register your own group in the directory", "Contribute resources, translations, or articles", "Share news of events in your region", "Volunteer to help maintain this site"].map((item, i) => (
                <div key={i} style={{ display: "flex", gap: "0.8rem", marginBottom: "0.9rem", alignItems: "flex-start" }}>
                  <span style={{ color: t.accentOnDark, marginTop: 3, flexShrink: 0, fontSize: "0.7rem" }}>✦</span>
                  <span style={{ color: t.darkSectionMuted, fontSize: "0.875rem", fontWeight: 300, lineHeight: 1.6 }}>{item}</span>
                </div>
              ))}
            </div>
          </div>
        </section>

      </main>
      <Footer t={t} />

      <TweaksPanel>
        <TweakSection label="Theme">
          <TweakRadio label="Palette" value={tweaks.theme} onChange={v => setTweak("theme", v)}
            options={[{ value: "midnight", label: "Midnight" }, { value: "dawn", label: "Dawn" }, { value: "threshold", label: "Threshold" }]} />
        </TweakSection>
        <TweakSection label="Typography">
          <TweakRadio label="Headings" value={tweaks.titleFont} onChange={v => setTweak("titleFont", v)}
            options={[{ value: "cinzel", label: "Cinzel" }, { value: "jost", label: "Jost" }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
</script>
</body>
</html>
